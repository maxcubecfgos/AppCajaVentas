name: cajarapida
description: "CajaRápida - Punto de Venta Offline-First para pequeños negocios"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.12.0

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  flutter_riverpod: ^2.4.9
  sqflite: ^2.3.0
  path: ^1.8.3
  intl: ^0.20.2
  path_provider: ^2.1.6
  share_plus: ^12.0.2
  file_picker: 8.3.7
  pdf: ^3.13.0
  printing: ^5.15.0
  qr_flutter: ^4.1.0
  mobile_scanner: ^7.2.0
  shared_preferences: ^2.2.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  flutter_launcher_icons: ^0.13.1

flutter_launcher_icons:
  android: "launcher_icon"
  ios: false
  image_path: "assets/images/icon.png"
  min_sdk_android: 21

flutter:
  uses-material-design: true
  assets:
    - assets/images/
